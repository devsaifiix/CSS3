<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Navbar</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f4f4;
            height: 200vh;
        }

        /* ================= NAVBAR ================= */

        nav {

            width: 100%;

            position: sticky;
            top: 0;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 18px 8%;

            background: linear-gradient(90deg, #0f172a, #1e293b);

            box-shadow: 0 5px 15px rgba(0, 0, 0, .25);

            z-index: 999;

        }

        /* ================= LOGO ================= */

        .logo {

            font-size: 30px;

            font-weight: bold;

            color: #38bdf8;

            cursor: pointer;

            letter-spacing: 2px;

            transition: .4s;

        }

        .logo:hover {

            color: white;

            transform: scale(1.08);

        }

        /* ================= MENU ================= */

        nav ul {

            display: flex;

            list-style: none;

            gap: 35px;

        }

        nav ul li {

            position: relative;

        }

        nav ul li a {

            color: white;

            text-decoration: none;

            font-size: 17px;

            font-weight: 500;

            padding: 10px 18px;

            border-radius: 30px;

            transition: .4s;

        }

        /* Hover Background */

        nav ul li a:hover {

            background: #38bdf8;

            color: #111827;

        }

        /* Underline Animation */

        nav ul li::after {

            content: "";

            position: absolute;

            left: 50%;

            bottom: -8px;

            width: 0;

            height: 3px;

            background: #38bdf8;

            transition: .4s;

            transform: translateX(-50%);

        }

        nav ul li:hover::after {

            width: 80%;

        }

        /* Active Link */

        .active {

            background: #38bdf8;

            color: #111827;

        }

        /* ================= HERO ================= */

        .hero {

            display: flex;

            justify-content: center;

            align-items: center;

            height: 90vh;

            text-align: center;

        }

        .hero h1 {

            font-size: 60px;

            color: #1e293b;

        }

        .hero p {

            margin-top: 20px;

            font-size: 20px;

            color: #555;

        }
    </style>

</head>

<body>

    <nav>

        <div class="logo">
            DevSaifiiX
        </div>

        <ul>

            <li><a href="#" class="active">Home</a></li>

            <li><a href="#">About</a></li>

            <li><a href="#">Services</a></li>

            <li><a href="#">Portfolio</a></li>

            <li><a href="#">Blog</a></li>

            <li><a href="#">Contact</a></li>

        </ul>

    </nav>

    <section class="hero">

        <div>

            <h1>Professional Navbar</h1>

            <p>Modern HTML & CSS Navigation Bar</p>

        </div>

    </section>

</body>

</html>
