<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backround Color</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        h1, p{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-color: rgb(128, 107, 147);
            text-align: center;
            border: 2px dotted black;
            border-radius: 5px;
            border-collapse: collapse;
            /* specifies the opacity/transparency of an element */
            opacity: 0.9;
        }


    </style>
</head>

<body>
    <h1>Learn About Backround Color</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Velit similique ipsum explicabo harum. Ab quo soluta
        modi, at quibusdam dolore aliquid quidem ut vel delectus culpa vero rerum exercitationem voluptatum?</p>
</body>

</html>
