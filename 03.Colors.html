<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>

        .ck{
            color: cadetblue;
        }

        .hc{
            color: #1de627;
        }

        .rgb{
            color: rgb(51, 88, 173);
        }

        .rgba{
            /* alpha varie 0 to 1 */
            color: rgba(100, 19, 189, 0.5);
        }

        .hsl{
            color: hsl(327, 88%, 47%);
        }
    </style>
</head>

<body>
    <h1>Learn About Colors</h1>
    <p>Colors can be represented in</p>
    <ol>
        <li class="ck">Colors Keywords</li>
        <li class="hc">Hex Color Code</li>
        <li class="rgb">RGB</li>
        <li class="rgba">RGBA</li>
        <li class="hsl">HSL</li>
    </ol>
</body>

</html>
