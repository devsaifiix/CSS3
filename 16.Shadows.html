<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadows</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 34px;
            /* box-shadow: horizontal vertical blur spread color; */
            box-shadow: 4px 0px 6px 5px green;
        }

        .text-shadows {
            /* text-shadow: horizontal vertical blur color; */
            text-shadow: 6px 15px 16px green;
        }
    </style>
</head>

<body>
    <div class="box">
        I am box.
    </div>

    <p class="text-shadows">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Quo assumenda quos, tempora, quidem corrupti
        consequatur soluta modi consequuntur eum accusantium ullam laborum, numquam exercitationem inventore.
    </p>
</body>

</html>
