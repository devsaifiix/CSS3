<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Text Decoration Style</title>

    <style>
        h1 {
            text-decoration-line: underline;
            text-decoration-style: solid;
        }

        h2 {
            text-decoration-line: underline;
            text-decoration-style: double;
        }

        h3 {
            text-decoration-line: underline;
            text-decoration-style: dotted;
        }

        p.ex1 {
            text-decoration-line: underline;
            text-decoration-style: dashed;
        }

        p.ex2 {
            text-decoration-line: underline;
            text-decoration-style: wavy;
        }

        p.ex3 {
            text-decoration-line: underline;
            text-decoration-color: red;
            text-decoration-style: wavy;
        }
    </style>
</head>

<body>

    <h1>Underline with Solid Style</h1>

    <h2>Underline with Double Style</h2>

    <h3>Underline with Dotted Style</h3>

    <p class="ex1">This paragraph has a dashed underline.</p>

    <p class="ex2">This paragraph has a wavy underline.</p>

    <p class="ex3">This paragraph has a red wavy underline.</p>

</body>

</html>
