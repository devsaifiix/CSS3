<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Color</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        h1 {
            /* font-family: "Baloo Bhai 2", sans-serif; */
            background: #686b72;
            color: #d31010;
        }

        p {
            /* font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif; */
            background: #2611cb;
            color: #f6de08;
        }
    </style>
</head>

<body>
    <h1>Text Formatting</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Cumque aperiam alias quo veritatis quam voluptas magni
        consequatur ipsa impedit ad rerum aliquid, sint praesentium provident dolor ipsum. Suscipit, modi cum.</p>
</body>

</html>
