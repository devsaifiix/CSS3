<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Text Shadow</title>

    <style>
        .box {
            border: 2px solid black;
            padding: 34px;
            font-weight: 300;
            /* text-shadow: horizontal vertical blur color; */
            /* text-shadow: 2px 1px 2px red; */
            color: aquamarine;
            font-size: 40px;
            text-align: center;
            /* Multiple Shadows */
            text-shadow: 1px 1px 2px black, 0 0 25px blue, 0 0 5px red;
        }
    </style>
</head>

<body>

    <div class="box">
        Welcome to CSS Text Shadow
    </div>

</body>

</html>
