<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Decoration</title>
    <style>
        h1 {
            text-decoration-line: line-through;
            text-decoration-color: red;
        }

        h2 {
            text-decoration-line: overline;
            text-decoration-color: aquamarine;
        }

        h3 {
            text-decoration-line: underline;
            text-decoration-color: blueviolet;
        }

        p {
            text-decoration-line: underline overline;
            text-decoration-color: cadetblue;
        }
    </style>
</head>

<body>
    <h1>This is text Decoration</h1>
    <h2>Learn about text Decoration</h2>
    <h3>How to use text Decoration?</h3>
    <p><code>text-decoration</code> CSS property text ki decoration ko control karti hai. Is se aap underline, overline,
        line-through aur decoration remove kar sakte hain.</p>
</body>

</html>
