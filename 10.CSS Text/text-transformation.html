<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Text Transform</title>
    <style>
        p.uppercase{
            text-transform: uppercase;
        }
       
        p.lowercase{
            text-transform: lowercase;
        }

        p.capitalize{
            text-transform: capitalize;
        }
    </style>

</head>
<body>

    <h1>CSS Text Transform Example</h1>

    <p class="uppercase">
        This text will be converted into uppercase letters.
    </p>

    <p class="lowercase">
        THIS TEXT WILL BE CONVERTED INTO LOWERCASE LETTERS.
    </p>

    <p class="capitalize">
        this text will capitalize the first letter of every word.
    </p>

</body>
</html>
