<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            border: 2px solid black;
            /* display: inline; */
            display: inline-block;
            width: 344px;
            padding: 45px;
            margin: 34px;
        }
        .box1{
            visibility: hidden;
            /* display: none; */
        }
    </style>
</head>

<body>
    <div class="box box1">
        Hey! I'm a Box.
    </div>
    <div class="box">also a nice box</div>
    <span>I am good</span>
    <span>boy</span>
</body>

</html>
