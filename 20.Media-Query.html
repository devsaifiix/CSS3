<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile First Responsive Design</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
        }

        /*  Mobile First (Default) */

        .container {
            width: 95%;
            margin: 30px auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: #3498db;
            color: white;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            font-size: 25px;
        }

        /* Tablet (768px and above) */

        @media screen and (min-width:768px) {

            body {
                background: #dff9fb;
            }

            .cards {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-between;
            }

            .card {
                width: 48%;
                background: #27ae60;
            }

        }

        /* Laptop (992px and above) */

        @media screen and (min-width:992px) {

            body {
                background: #fff3cd;
            }

            .card {
                width: 31%;
                background: #e67e22;
            }

        }

        /* Desktop (1200px and above) */

        @media screen and (min-width:1200px) {

            body {
                background: #ecf0f1;
            }

            .container {
                width: 1200px;
            }

            .card {
                background: #8e44ad;
                font-size: 30px;
            }

        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Mobile First Responsive Design</h1>

        <div class="cards">

            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card">Card 3</div>
            <div class="card">Card 4</div>

        </div>

    </div>

</body>

</html>
