<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Awesome</title>
    <script src="https://kit.fontawesome.com/81ecc62ca5.js" crossorigin="anonymous"></script>
    <style>
        .icons {
            text-align: center;
        }

        .icons a {
            margin: 0 10px;
            text-decoration: none;
        }

        .fa-twitter {
            color: hsl(203, 89%, 53%);
        }

        .fa-twitter:hover {
            color: hsl(203, 89%, 63%);
            border-bottom: 2px solid hsl(203, 89%, 63%);
            padding-bottom: 5px;
        }

        .fa-youtube {
            color: hsl(0, 100%, 50%);
        }

        .fa-youtube:hover {
            color:  hsl(0, 100%, 50%);
            border-bottom: 2px solid  hsl(0, 100%, 50%) ;
        }

        .fa-tiktok {
            color: hwb(0 0% 100%);
        }

        .fa-tiktok:hover {
            color:  hwb(0 0% 100%);
            border-bottom: 2px solid hwb(0 0% 110%) ;
        }

        .fa-instagram {
            color: hsl(340, 75%, 54%);
        }

        .fa-instagram:hover {
            color: hsl(340, 75%, 64%);
            border-bottom: 2px solid  hsl(340, 75%, 64%) ;
        }
    </style>
</head>

<body>
    <div class="icons">
        <a href="https://x.com/" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-twitter fa-2x"></i>
        </a>

        <a href="https://youtube.com/" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-youtube fa-2x"></i>
        </a>

        <a href="https://tiktok.com/" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-tiktok fa-2x"></i>
        </a>

        <a href="https://instagram.com/" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-instagram fa-2x"></i>
        </a>
    </div>
</body>

</html>
