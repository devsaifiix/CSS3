<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            height: 433px;
            width: 88vw;
            padding: 6px;
            border: 2px solid black;
        }

        .box1 {
            background-color: aqua;
            position: sticky;
            top: 0;
            height: 111px;
            width: 100%;
            margin: 0;
            padding: 0;


            /* position: relative;
            z-index: 1;
            top: 8px;
            left: 30px; */
        }

        .box2 {
            background-color: azure;
            /* position: relative;
            bottom: 34px;
            left: 80px; */
        }

        .box3 {
            background-color: beige;
            /* position: fixed;
            bottom: 0px;
            left: 3vw;
            height: 111px; */
        }

        .box4 {
            background-color: blanchedalmond;
        }

        .parent {
            padding: 3px;
            margin: 34px;
            border: 3px solid purple;
            /* position: absolute; */
            
            /* Exception: transform, filter, or prespective properties can also 
            make an element appear as positioned */
            /* transform: translate(0); */
            /* filter: invert(0); */
            /* perspective: 0em; */
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>

</html>
