<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Assign</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .banner {
            width: calc(100% - 40px);
            height: 220px;
            position: relative;
            overflow: hidden;
            background-color: #ff5722;
            margin: 20px;
        }

        .left-img {
            width: 310px;
            height: 220px;
            background: yellow;
            position: relative;
            top: 0;
            left: 0;
        }

        .left-img img {
            position: absolute;
            top: 42px;
            left: 30px;
            height: 198px;
        }

        .right-img img {
            position: absolute;
            left: 267px;
            top: 49px;
            height: 185px;
        }

        .content {
            text-align: center;
            position: absolute;
            right: 150px;
            top: 38%;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 20px;
            color: white;
        }

        .content h1 {
            font-size: 38px;
            margin-bottom: 20px;
        }

        .content button {
            background: yellow;
            border: none;
            color: white;
            border: 6px;
            padding: 10px 25px;
            font-size: 25px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <div class="banner">
            <div class="left-img">
                <img src="./25.png" alt="left-img">
            </div>

            <div class="right-img">
                <img src="./27.png" alt="right-img">
            </div>

            <div class="content">
                <h1>Fashion Exclusively Only For You!!</h1>
                <button>Fashion -></button>
            </div>
        </div>
    </header>
</body>

</html>
